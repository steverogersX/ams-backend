services:
  postgres:
    image: postgres:16-alpine
    container_name: ams-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-ams}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - ams-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ams}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ams-pgdata:
